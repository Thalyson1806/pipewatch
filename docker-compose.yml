services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pipewatch
      POSTGRES_PASSWORD: pipewatch
      POSTGRES_DB: pipewatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipewatch"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:8080"
    environment:
      DATABASE_URL: postgresql://pipewatch:pipewatch@db:5432/pipewatch
      SECRET_KEY: dev-only
      PIPEFY_WEBHOOK_SECRET: ""
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
