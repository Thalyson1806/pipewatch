server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # rota o /api pro backend — necessário em produção onde frontend e backend são serviços separados
    location /api/ {
        # em produção, substitua pelo URL do Cloud Run via envsubst
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;

        # SSE exige que o proxy não bufferize a resposta
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # fallback pra SPA (React Router futuro)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
